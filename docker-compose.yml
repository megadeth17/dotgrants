version: '3.8'
services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - /root/dotgrants/target/ink:/abi:ro
      - backend-data:/data
    environment:
      - NODE_URL=ws://host.docker.internal:9944
      - ABI_PATH=/abi/dotgrants.json
      - DB_PATH=/data/grants.db
      - CONTRACT_ADDRESS=
    command: bash -c 'pip install -q fastapi uvicorn substrateinterface && uvicorn main:app --host 0.0.0.0 --port 8000'
    ports:
      - '8000:8000'
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - '80:80'
    restart: unless-stopped

volumes:
  backend-data:
